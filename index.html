<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PhysicsSubmit</title>
  <style>
    body {
      background: linear-gradient(to right, black, white);
      font-family: Arial, sans-serif;
    } 
    h6 {
      color: grey;
      font-style: italic;
      text-align: center;
    } 
    h1 {
      text-align: center;
      color: white;
    } 
    .navbar {
      background: linear-gradient(to right, purple, red);
      border: none;
      border-radius: 8px;
      padding: 12px 28px;
    } 
    p {
      color: grey;
    }
    .form-container {
      background: rgba(255, 255, 255, 0.1);
      padding: 20px;
      border-radius: 8px;
      max-width: 400px;
      margin: 20px auto;
      text-align: center;
    }
    .form-container input[type="file"], 
    .form-container input[type="email"],
    .form-container button {
      margin: 10px 0;
      padding: 10px;
      width: 90%;
      border-radius: 4px;
      border: none;
    }
    .form-container button {
      background-color: purple;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
    .form-container button:hover {
      background-color: red;
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <p>Submit your ideas here...</p>
  </nav>

  <h1>PhysicsSubmit</h1>
  <h6>Submit your physics articles here...</h6>

  <div class="form-container">
    <form action="https://formspree.io/f/miguelsaldanha1213@gmail.com" method="POST" enctype="multipart/form-data">
      
      <label style="color: white;" for="email">Your Email:</label>
      <input type="email" name="_replyto" id="email" placeholder="your-email@example.com" required>
      
      <label style="color: white;" for="file">Upload your Theory (PDF):</label>
      <input type="file" name="upload" id="file" accept=".pdf" required>
      
      <button type="submit">Send Theory</button>
    </form>
  </div>

</body>
</html>
